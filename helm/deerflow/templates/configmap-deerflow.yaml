apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "deerflow.fullname" . }}-config
  labels:
    {{- include "deerflow.labels" . | nindent 4 }}
    app.kubernetes.io/component: config
data:
  config.yaml: |
    config_version: 1


    # Provider-Level Configurations
    
    x-google-defaults: &google-defaults
      use: langchain_google_genai:ChatGoogleGenerativeAI
      google_api_key: $GOOGLE_API_KEY
      temperature: 0.5
      streaming: true
      verbose: true
      max_output_tokens: 8192
      supports_vision: true
      supports_thinking: true

    x-perplexity-defaults: &perplexity-defaults
      use: langchain_perplexity:ChatPerplexity
      api_key: $PPLX_API_KEY
      temperature: 0.8
      streaming: true
      supports_vision: false
      supports_thinking: true

    x-openai-defaults: &openai-defaults
      use: langchain_openai:ChatOpenAI
      api_key: $OPEN_AI_API_KEY
      temperature: 0.5
      streaming: true
      verbose: true
      supports_thinking: true
      supports_vision: true

    x-anthropic-defaults: &anthropic-defaults
      use: langchain_anthropic:ChatAnthropic
      api_key: $ANTHROPIC_API_KEY
      temperature: 0.5
      streaming: true
      verbose: true
      max_tokens: 8192
      supports_vision: true
      supports_thinking: true

    x-mistral-defaults: &mistral-defaults
      use: langchain_mistralai:ChatMistralAI
      api_key: $MISTRAL_AI_API_KEY
      temperature: 0.5
      streaming: true
      verbose: true
      supports_vision: true
      supports_thinking: true
    
    models:

      # ---------------- Google Gemini ----------------

      - <<: *google-defaults
        name: gemini-3.1-pro-preview
        display_name: "Gemini 3.1 Pro"
        description: "Advanced multimodal AI model for complex web tasks with extended conversation capabilities"
        model: gemini-3.1-pro-preview

      - <<: *google-defaults
        name: gemini-2.5-pro
        display_name: "Gemini 2.5 Pro"
        description: "Advanced reasoning Gemini model, capable of solving complex problems"
        model: gemini-2.5-pro

      - <<: *google-defaults
        name: gemini-2.5-flash
        display_name: "Gemini 2.5 Flash"
        description: "Fast and efficient Gemini model with near-frontier intelligence at exceptional speed"
        model: gemini-2.5-flash

      - <<: *google-defaults
        name: gemini-2.5-flash-lite
        display_name: "Gemini 2.5 Flash-Lite"
        description: "The fastest and most budget-friendly multimodal model in the 2.5 family"
        model: gemini-2.5-flash-lite

      - <<: *google-defaults
        name: gemini-3-flash-preview
        display_name: "Gemini 3 Flash Preview"
        description: "High-efficiency preview model with exceptional speed and agentic coding capabilities"
        model: gemini-3-flash-preview

      - <<: *google-defaults
        name: gemini-3.1-flash-lite-preview
        display_name: "Gemini 3.1 Flash-Lite Preview"
        description: "Frontier-class performance rivaling larger models at a fraction of the cost"
        model: gemini-3.1-flash-lite-preview

      - <<: *google-defaults
        name: gemini-deep-research-preview
        display_name: "Gemini Deep Research Preview"
        description: "Agentic model that autonomously plans and executes multi-step research across hundreds of sources"
        model: deep-research-preview-04-2026
        supports_vision: false

      - <<: *google-defaults
        name: gemini-deep-research-max-preview
        display_name: "Gemini Deep Research Max Preview"
        description: "Maximum comprehensiveness for automated context gathering and synthesis across hundreds of sources"
        model: deep-research-max-preview-04-2026
        supports_vision: false

      # ---------------- Perplexity ----------------

      - <<: *perplexity-defaults
        name: sonar-deep-research
        display_name: "Perplexity Deep Research"
        description: "Automated in-depth research and analysis mode, saving significant time and effort"
        model: sonar-deep-research
        supports_vision: true

      - <<: *perplexity-defaults
        name: sonar-reasoning-pro
        display_name: "Perplexity Reasoning Pro"
        description: "Advanced search and reasoning for complex queries requiring multi-step analysis"
        model: sonar-reasoning-pro

      - <<: *perplexity-defaults
        name: sonar
        display_name: "Perplexity Sonar"
        description: "General purpose search and information retrieval model"
        model: sonar
        supports_thinking: false

      - <<: *perplexity-defaults
        name: sonar-pro
        display_name: "Perplexity Sonar Pro"
        description: "Advanced search offering with grounding, supporting complex queries and follow-ups"
        model: sonar-pro
        supports_thinking: false

      # ---------------- OpenAI ----------------

      - <<: *openai-defaults
        name: gpt-4o
        display_name: "GPT-4o"
        description: "OpenAI's most advanced multimodal model with vision capabilities"
        model: gpt-4o

      - <<: *openai-defaults
        name: gpt-4o-search-preview
        display_name: "GPT-4o Search Preview"
        description: "GPT-4o optimized for search and information retrieval tasks"
        model: gpt-4o-search-preview
        supports_vision: false

      - <<: *openai-defaults
        name: gpt-4.1
        display_name: "GPT-4.1"
        description: "Enhanced GPT-4 series model with improved capabilities"
        model: gpt-4.1

      - <<: *openai-defaults
        name: gpt-4.1-mini
        display_name: "GPT-4.1 Mini"
        description: "Efficient GPT-4.1 variant optimized for cost and speed"
        model: gpt-4.1-mini

      - <<: *openai-defaults
        name: gpt-4.1-nano
        display_name: "GPT-4.1 Nano"
        description: "Smallest GPT-4.1 variant for lightweight tasks"
        model: gpt-4.1-nano

      - <<: *openai-defaults
        name: gpt-5
        display_name: "GPT-5"
        description: "Next-generation GPT model with advanced reasoning capabilities"
        model: gpt-5

      - <<: *openai-defaults
        name: gpt-5.1
        display_name: "GPT-5.1"
        description: "Enhanced GPT-5 with additional improvements"
        model: gpt-5.1

      - <<: *openai-defaults
        name: gpt-5-mini
        display_name: "GPT-5 Mini"
        description: "Efficient GPT-5 variant for balanced performance"
        model: gpt-5-mini

      - <<: *openai-defaults
        name: gpt-5-nano
        display_name: "GPT-5 Nano"
        description: "Lightweight GPT-5 for resource-constrained scenarios"
        model: gpt-5-nano

      - <<: *openai-defaults
        name: gpt-5-pro
        display_name: "GPT-5 Pro"
        description: "Extended reasoning variant using scaled test-time compute for highest quality responses"
        model: gpt-5-pro

      - <<: *openai-defaults
        name: gpt-5.4
        display_name: "GPT-5.4"
        description: "Best intelligence at scale for agentic, coding, and professional workflows"
        model: gpt-5.4

      - <<: *openai-defaults
        name: gpt-5.4-mini
        display_name: "GPT-5.4 Mini"
        description: "Strongest mini model yet for coding, computer use, and subagents"
        model: gpt-5.4-mini

      - <<: *openai-defaults
        name: gpt-5.4-nano
        display_name: "GPT-5.4 Nano"
        description: "Cheapest GPT-5.4-class model for simple high-volume tasks"
        model: gpt-5.4-nano

      # ---------------- Anthropic ----------------

      - <<: *anthropic-defaults
        name: claude-opus-4-7
        display_name: "Claude Opus 4.7"
        description: "Latest Opus model with step-change improvement in agentic coding, vision, and multi-step tasks (April 2026)"
        model_name: claude-opus-4-7

      - <<: *anthropic-defaults
        name: claude-sonnet-4-6
        display_name: "Claude Sonnet 4.6"
        description: "Latest Sonnet - best combination of speed and intelligence with extended thinking capabilities"
        model_name: claude-sonnet-4-6

      - <<: *anthropic-defaults
        name: claude-sonnet-4-5
        display_name: "Claude Sonnet 4.5"
        description: "Powerful Sonnet model with enhanced reasoning and extended thinking"
        model_name: claude-sonnet-4-5

      - <<: *anthropic-defaults
        name: claude-haiku-4-5
        display_name: "Claude Haiku 4.5"
        description: "The fastest model with near-frontier intelligence"
        model_name: claude-haiku-4-5

      # ---------------- Mistral AI ----------------

      - <<: *mistral-defaults
        name: mistral-small-4
        display_name: "Mistral Small 4"
        description: "Hybrid model unifying instruct, reasoning, and coding in a single efficient model (March 2026)"
        model_name: mistral-small-4-0-26-03

      - <<: *mistral-defaults
        name: mistral-large-3
        display_name: "Mistral Large 3"
        description: "State-of-the-art, open-weight, general-purpose multimodal model (December 2025)"
        model_name: mistral-large-3-25-12

      - <<: *mistral-defaults
        name: mistral-medium-latest
        display_name: "Mistral Medium"
        description: "Mistral AI medium-tier model with strong capabilities"
        model_name: mistral-medium-latest

      - <<: *mistral-defaults
        name: magistral-medium-1-2
        display_name: "Magistral Medium 1.2"
        description: "Frontier-class multimodal reasoning model (September 2025)"
        model_name: magistral-medium-1-2-25-09

      - <<: *mistral-defaults
        name: devstral-2
        display_name: "Devstral 2"
        description: "Frontier code agents model for solving software engineering tasks (December 2025)"
        model_name: devstral-2-25-12

    tool_groups:
      - name: web
      - name: file:read
      - name: file:write
      - name: bash

    tools:
      - name: web_search
        group: web
        use: deerflow.community.tavily.tools:web_search_tool
        max_results: 5

      - name: web_fetch
        group: web
        use: deerflow.community.jina_ai.tools:web_fetch_tool
        timeout: 10

      - name: image_search
        group: web
        use: deerflow.community.image_search.tools:image_search_tool
        max_results: 5

      - name: ls
        group: file:read
        use: deerflow.sandbox.tools:ls_tool

      - name: read_file
        group: file:read
        use: deerflow.sandbox.tools:read_file_tool

      - name: write_file
        group: file:write
        use: deerflow.sandbox.tools:write_file_tool

      - name: str_replace
        group: file:write
        use: deerflow.sandbox.tools:str_replace_tool

      - name: bash
        group: bash
        use: deerflow.sandbox.tools:bash_tool

    sandbox:
      use: deerflow.community.aio_sandbox:AioSandboxProvider
      provisioner_url: http://{{ include "deerflow.fullname" . }}-provisioner:8002

    skills:
      container_path: /mnt/skills

    title:
      enabled: true
      max_words: 6
      max_chars: 60
      model_name: null

    summarization:
      enabled: true
      model_name: null
      trigger:
        - type: tokens
          value: 15564
      keep:
        type: messages
        value: 10
      trim_tokens_to_summarize: 15564
      summary_prompt: null

    memory:
      enabled: true
      storage_path: memory.json
      debounce_seconds: 30
      model_name: null
      max_facts: 100
      fact_confidence_threshold: 0.7
      injection_enabled: true
      max_injection_tokens: 2000

    checkpointer:
      type: sqlite
      connection_string: checkpoints.db

  extensions_config.json: |
    {
      "mcpServers": {},
      "skills": {}
    }
