apiVersion: v1
kind: Secret
metadata:
  name: {{ include "deerflow.fullname" . }}-secrets
  labels:
    {{- include "deerflow.labels" . | nindent 4 }}
type: Opaque
stringData:
  GOOGLE_API_KEY: {{ .Values.secrets.googleApiKey | quote }}
  TAVILY_API_KEY: {{ .Values.secrets.tavilyApiKey | quote }}
  JINA_API_KEY: {{ .Values.secrets.jinaApiKey | quote }}
  BETTER_AUTH_SECRET: {{ .Values.secrets.betterAuthSecret | quote }}
  {{- if .Values.langfuse.enabled }}
  LANGFUSE_PUBLIC_KEY: {{ .Values.langfuse.publicKey | quote }}
  LANGFUSE_SECRET_KEY: {{ .Values.langfuse.secretKey | quote }}
  {{- end }}
